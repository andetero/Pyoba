<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyoba</title>
  <meta name="description" content="Simple, thoughtful apps">
  <meta name="theme-color" content="#0e0c0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c0a;
      --ink: #e8e4dc;
      --mid: #7a7060;
      --faint: #2a2520;
      --gold: #b8860b;
      --serif: 'Playfair Display', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--faint);
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 16px;
    }

    h1 {
      font-family: var(--serif);
      font-size: 36px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
    }

    .apps {
      padding: 40px 0;
      flex: 1;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--mid);
      margin-bottom: 20px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: #1a1814;
      border-radius: 12px;
      border: 1px solid var(--faint);
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }

    .app-card:hover { border-color: var(--gold); }

    .app-icon {
      width: 64px;
      height: 64px;
      min-width: 64px;
      border-radius: 14px;
      background: #0e0c0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .app-icon img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: block;
    }

    .app-card.loading .app-icon,
    .app-card.loading .skel {
      background: linear-gradient(90deg, #1e1c18 25%, #2a2520 50%, #1e1c18 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    .app-card.loading .app-icon { border-radius: 14px; }

    .skel-name  { height: 20px; width: 140px; margin-bottom: 10px; }
    .skel-desc1 { height: 10px; width: 100%; margin-bottom: 6px; }
    .skel-desc2 { height: 10px; width: 75%; margin-bottom: 10px; }
    .skel-link  { height: 10px; width: 60px; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .app-info { flex: 1; min-width: 0; }

    .app-name {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .app-desc {
      font-size: 12px;
      color: var(--mid);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .app-links {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .app-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.15s;
    }

    .app-link:hover { color: var(--ink); }

    .app-link svg {
      width: 13px;
      height: 13px;
      min-width: 13px;
      fill: currentColor;
      overflow: visible;
    }

    .status {
      font-size: 12px;
      color: var(--mid);
      padding: 8px 0;
    }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--faint);
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
    }

    footer a { color: var(--mid); text-decoration: none; }
    footer a:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">PYOBA</div>
      <h1>Simple apps,<br>thoughtfully made.</h1>
    </header>

    <div class="apps">
      <div class="section-label">APPS</div>
      <div id="status" class="status" aria-live="polite"></div>
      <div id="app-list"></div>
    </div>

    <footer>
      <span>© 2026 PYOBA</span>
    </footer>
  </div>

  <script>
    const APPLE_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;

    const list = document.getElementById('app-list');
    const status = document.getElementById('status');

    function truncateAtWord(text, maxLength = 160) {
      if (!text) return '';
      const normalized = text.replace(/\s+/g, ' ').trim();
      if (normalized.length <= maxLength) return normalized;
      return normalized.slice(0, maxLength).replace(/\s\S*$/, '') + '…';
    }

    function renderSkeletons(count = 6) {
      list.innerHTML = '';
      for (let i = 0; i < count; i += 1) {
        const card = document.createElement('div');
        card.className = 'app-card loading';
        card.innerHTML = `
          <div class="app-icon"></div>
          <div class="app-info">
            <div class="skel skel-name"></div>
            <div class="skel skel-desc1"></div>
            <div class="skel skel-desc2"></div>
            <div class="skel skel-link"></div>
          </div>
        `;
        list.appendChild(card);
      }
    }

    function renderApps(results) {
      list.innerHTML = '';

      if (!Array.isArray(results) || results.length === 0) {
        status.textContent = 'No apps found.';
        return;
      }

      status.textContent = '';

      results.forEach(app => {
        const id = String(app.trackId || '');
        const name = app.trackName || '';
        const desc = truncateAtWord(app.description || '', 160);
        const iconUrl = app.artworkUrl100 || '';
        const storeUrl = app.trackViewUrl || `https://apps.apple.com/us/app/id${id}`;

        const card = document.createElement('div');
        card.className = 'app-card';

        card.innerHTML = `
          <div class="app-icon">
            ${iconUrl ? `<img src="${iconUrl}" alt="${name} icon">` : ''}
          </div>
          <div class="app-info">
            <div class="app-name">${name}</div>
            <div class="app-desc">${desc}</div>
            <div class="app-links">
              <a href="${storeUrl}" class="app-link" target="_blank" rel="noopener noreferrer">${APPLE_SVG} App Store</a>
            </div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    renderSkeletons();

    fetch('/apps.json', { cache: 'no-store' })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const results = Array.isArray(data?.results) ? data.results : [];
        renderApps(results);
      })
      .catch(error => {
        console.error('Failed to load apps.json:', error);
        list.innerHTML = '';
        status.textContent = 'Unable to load app data right now.';
      });
  </script>
</body>
</html>
